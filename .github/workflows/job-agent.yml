name: Personal Job Search Agent

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. This runs twice daily.
    - cron: "15 6,18 * * *"

permissions:
  contents: read

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore SQLite cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: data
          key: job-agent-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            job-agent-db-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Materialize Gmail OAuth files
        shell: bash
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p secrets
          if [ -n "$GMAIL_CREDENTIALS_JSON" ]; then
            printf '%s' "$GMAIL_CREDENTIALS_JSON" > secrets/gmail_credentials.json
          fi
          if [ -n "$GMAIL_TOKEN_JSON" ]; then
            printf '%s' "$GMAIL_TOKEN_JSON" > secrets/gmail_token.json
          fi

      - name: Run job agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINN_SEARCH_URLS: ${{ secrets.FINN_SEARCH_URLS }}
          MIN_SCORE: ${{ vars.MIN_SCORE || '75' }}
          REQUEST_DELAY_SECONDS: ${{ vars.REQUEST_DELAY_SECONDS || '3' }}
          MAX_DETAIL_FETCHES_PER_RUN: ${{ vars.MAX_DETAIL_FETCHES_PER_RUN || '20' }}
          MAX_NEW_JOBS_PER_RUN: ${{ vars.MAX_NEW_JOBS_PER_RUN || '20' }}
          INITIAL_BACKFILL: ${{ vars.INITIAL_BACKFILL || 'false' }}
          BACKFILL_MAX_PAGES: ${{ vars.BACKFILL_MAX_PAGES || '5' }}
          BACKFILL_MAX_DETAIL_FETCHES: ${{ vars.BACKFILL_MAX_DETAIL_FETCHES || '100' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          DB_PATH: data/jobs.sqlite
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          FINN_MAX_PAGES_PER_SEARCH: ${{ vars.FINN_MAX_PAGES_PER_SEARCH || '3' }}
          ENABLE_GMAIL: ${{ vars.ENABLE_GMAIL || 'false' }}
          GMAIL_CREDENTIALS_PATH: ${{ vars.GMAIL_CREDENTIALS_PATH || 'secrets/gmail_credentials.json' }}
          GMAIL_TOKEN_PATH: ${{ vars.GMAIL_TOKEN_PATH || 'secrets/gmail_token.json' }}
          GMAIL_QUERY: ${{ vars.GMAIL_QUERY || 'in:inbox newer_than:30d ((from:simen_fricker@hotmail.com subject:FW) OR from:finn.no OR from:indeed.com)' }}
          GMAIL_CLEANUP_ACTION: ${{ vars.GMAIL_CLEANUP_ACTION || 'archive' }}
          GMAIL_MAX_EMAILS_PER_RUN: ${{ vars.GMAIL_MAX_EMAILS_PER_RUN || '20' }}
          LOG_LEVEL: INFO
        run: python -m src.main

      - name: Save SQLite cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: job-agent-db-${{ runner.os }}-${{ github.run_id }}
